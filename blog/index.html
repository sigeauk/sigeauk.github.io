{% for category in site.categories %}
<li style="margin-bottom: 0.5rem;">
    <a href="{{ '/blog/archive/?category=' | append: category[0] | slugify | absolute_url }}" class="read-more" style="font-weight: normal;">
        {{ category[0] }}
    </a>
</li>
{% endfor %}

{% for tag in site.tags %}
<a href="{{ '/blog/archive/?tag=' | append: tag[0] | slugify | absolute_url }}" 
   style="font-size: 0.8rem; color: var(--text-dim); border: 1px solid var(--border-color); padding: 2px 8px; border-radius: 4px; text-decoration: none;">
   #{{ tag[0] }}
</a>
{% endfor %}
