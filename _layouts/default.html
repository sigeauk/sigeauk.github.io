<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="{{ '/images/sigea 16x16.png' | absolute_url }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ '/images/sigea 32x32.png' | absolute_url }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ '/images/sigea 16x16.png' | absolute_url }}">
    <link rel="icon" type="image/png" sizes="48x48" href="{{ '/images/sigea 48x48.png' | absolute_url }}">
    <link rel="stylesheet" href="{{ '/style.css' | absolute_url }}?v=1.1.0">
    <title>{{ page.title }} | Sigea</title>
    {% seo %}
</head>
<body>

<header class="site-header">
    <div class="header-container">
        <a href="{{ '/' | absolute_url }}" class="brand-box">
            <img src="{{ '/images/sigea.svg' | absolute_url }}" alt="Sigea Logo" class="logo">
            <h1 class="site-title">SIGEA</h1>
        </a>
        <nav class="site-nav">
            <a href="{{ '/' | absolute_url }}">Home</a>
            <a href="{{ '/tide' | absolute_url }}">TIDE</a>
            <a href="{{ '/blog' | absolute_url }}">Blog</a>
        </nav>
    </div>
</header>

<main class="content-section">
    {{ content }}
</main>

<div class="footer-container">
    <footer class="footer">
        <p class="copyright-text">&copy; {{ "now" | date: "%Y" }} Sigea.</p>
        
        <div class="footer-badges">
            <div class="footer-badge-item">
                <a href="https://registry.blockmarktech.com/certificates/7d2e3e51-546b-4820-b05c-8396d5a40ddd/" target="_blank" rel="noopener">
                    <img src="{{ '/images/CE.png' | absolute_url }}" alt="Cyber Essentials">
                </a>
                <span class="badge-label">Certified</span>
            </div>

            <div class="footer-badge-item">
                <a href="https://associate-link.com" target="_blank" rel="noopener">
                    <img src="{{ '/images/associate-logo.png' | absolute_url }}" alt="Associate Name">
                </a>
                <span class="badge-label">Official Associate</span>
            </div>
        </div>
    </footer>
</div>

</body>
</html>
