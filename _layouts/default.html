<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="{{ '/images/sigea16x16.png' | absolute_url }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ '/images/sigea 32x32.png' | absolute_url }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ '/images/sigea 16x16.png' | absolute_url }}">
    <link rel="icon" type="image/png" sizes="48x48" href="{{ '/images/sigea 48x48.png' | absolute_url }}">
    <link rel="stylesheet" href="{{ '/style.css' | absolute_url }}?v=1.1.0">
    <title>{{ page.title }} | Sigea</title>
    {% seo %}
</head>
<body>

<header class="site-header">
    <div class="header-container">
        <a href="{{ '/' | absolute_url }}" class="brand-box">
            <img src="{{ '/images/sigea.svg' | absolute_url }}" alt="Sigea Logo" class="logo">
            <h1 class="site-title">SIGEA</h1>
        </a>
        <nav class="site-nav">
            <a href="{{ '/' | absolute_url }}">Home</a>
            <a href="{{ '/tide' | absolute_url }}">TIDE</a>
            <a href="{{ '/blog' | absolute_url }}">Blog</a>
        </nav>
    </div>
</header>

<main class="content-section">
    {{ content }}
</main>

<div class="footer-container">
    <footer class="footer">
        <p>&copy; {{ "now" | date: "%Y" }} Sigea.</p>
    </footer>
</div>

</body>
</html>
