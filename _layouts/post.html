---
layout: default
---

<article class="post-content">
  <header class="hero-mini">
    <h1 class="main-heading" style="color: var(--primary-accent) !important;">{{ page.title }}</h1>
    <div class="post-meta-row">
      <span class="post-meta-date">{{ page.date | date: "%B %d, %Y" }}</span>
      <span class="post-meta-taxonomy">
        {% if page.categories.size > 0 %}
          {% for cat in page.categories %}
            <a href="{{ '/blog/archive/' | absolute_url }}?category={{ cat | url_encode }}" class="tag-item">{{ cat }}</a>
          {% endfor %}
        {% endif %}
        {% if page.tags.size > 0 %}
          {% for t in page.tags %}
            <a href="{{ '/blog/archive/' | absolute_url }}?tag={{ t | url_encode }}" class="tag-item">{{ t }}</a>
          {% endfor %}
        {% endif %}
      </span>
    </div>
  </header>

  <div class="markdown-body">
    {{ content }}
  </div>
</article>

<style>
  /* Fix Title Colors for Markdown Headings */
  .markdown-body h2, 
  .markdown-body h3 {
    color: var(--primary-accent) !important;
    margin-top: 2.5rem;
  }

  /* Ensure Tables are Visible with your Site Borders */
  .markdown-body table {
    display: table !important;
    width: 100%;
    border-collapse: collapse !important;
    margin: 2rem 0;
    border: 1px solid var(--border-color) !important;
    background-color: var(--card-bg);
  }

  .markdown-body th {
    background: var(--bg-color);
    color: var(--primary-accent);
    border: 1px solid var(--border-color) !important;
    padding: 12px;
    font-weight: bold;
  }

  .markdown-body td {
    border: 1px solid var(--border-color) !important;
    padding: 12px;
    color: var(--text-main);
  }

  /* Disable the Image "Growing" (Scale) effect from style.css */
  .markdown-body .gallery-item {
    transition: none !important;
    transform: none !important;
  }

  .markdown-body .gallery-item:hover {
    transform: none !important;
  }

  .markdown-body img {
    max-width: 100%;
    height: auto;
    border: 1px solid var(--border-color);
    border-radius: 8px;
    display: block;
    margin: 1rem 0;
  }

  /* Style Blockquotes (the '>' in Markdown) */
  .markdown-body blockquote {
    padding: 1rem 1.5rem;
    margin: 2rem 0;
    color: var(--text-dim);
    background-color: var(--card-bg);
    border-left: 1px solid var(--primary-accent);
    border-top: 1px solid var(--border-color);
    border-right: 1px solid var(--border-color);
    border-bottom: 1px solid var(--border-color);
    border-radius: 0 8px 8px 0;
  }

  /* Ensure paragraphs inside the blockquote don't have extra margins */
  .markdown-body blockquote p {
    margin: 0;
    font-style: italic;
  }

</style>
