---
layout: default
title: Archive
permalink: /blog/archive/
---

<div class="hero-mini">
    <h2 class="main-heading" id="archive-title">Archive</h2>
    <p class="accent-subtitle" id="archive-subtitle">Filtered Posts</p>
</div>

<div class="blog-feed">
    {% for post in site.posts %}
    <article class="blog-card archive-post" 
             data-categories="{{ post.categories | join: ',' | downcase }}" 
             data-tags="{{ post.tags | join: ',' | downcase }}" 
             style="display: none; background: var(--card-bg); border: 1px solid var(--border-color); padding: 1.5rem; border-radius: 12px; border-left: 4px solid var(--primary-accent); margin-bottom: 2rem;">
        <header class="blog-card-meta" style="color: var(--text-dim); font-size: 0.85rem; margin-bottom: 0.5rem;">
            {{ post.date | date: "%B %d, %Y" }}
        </header>
        <h3 class="blog-card-title">
            <a href="{{ post.url | absolute_url }}" style="color: var(--text-main); text-decoration: none;">{{ post.title }}</a>
        </h3>
        <p class="blog-card-excerpt" style="color: var(--text-dim);">{{ post.excerpt | strip_html | truncatewords: 25 }}</p>
    </article>
    {% endfor %}
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const cat = params.get('category');
    const tag = params.get('tag');
    const posts = document.querySelectorAll('.archive-post');
    const title = document.getElementById('archive-title');

    if (cat) {
        title.innerText = "Category: " + cat;
        posts.forEach(p => {
            if (p.dataset.categories.split(',').includes(cat.toLowerCase())) p.style.display = 'block';
        });
    } else if (tag) {
        title.innerText = "Tag: #" + tag;
        posts.forEach(p => {
            if (p.dataset.tags.split(',').includes(tag.toLowerCase())) p.style.display = 'block';
        });
    }
</script>
